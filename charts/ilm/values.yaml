# Default values for ilm.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Global parameters that will overwrite local parameters
global:
  replicaCount: 1
  config:
    enabled: true
  image:
    registry: ""
    repository: ""
    # array of secret names
    pullSecrets: []
  volumes:
    ephemeral:
      type: ""
      sizeLimit: ""
      storageClassName: ""
      custom: {}
  database:
    # currently only postgresql is supported
    type: ""
    host: ""
    port: ""
    name: ""
    username: ""
    password: ""
    pgBouncer:
      enabled: true
      host: "pg-bouncer-service"
      port: 5432
  trusted:
    certificates: ""
  httpProxy: ""
  httpsProxy: ""
  noProxy: ""
  hostName: ""
  keycloak:
    enabled: false
    # client secret must be set if keycloak is enabled
    clientSecret: ""
  messaging:
    external:
      enabled: false
      host: ""
      amqp:
        port: ""
    remoteAccess: false
    username: ""
    password: ""
    provisionerUsername: ""
    provisionerPassword: ""
    proxyUsername: ""
    proxyPassword: ""
    coreUsername: ""
    corePassword: ""
    virtualHost: ""
  provisioning:
    apiUrl: ""
    apiKey: ""
  proxy:
    enabled: false
  utils:
    enabled: false
  admin:
    username: ""
    password: ""
    name: ""
    surname: ""
    email: ""
  # additional init containers that will be added to each pod
  # - name: some-image
  #   image: some-image
  #   imagePullPolicy: IfNotPresent
  #   securityContext:
  #     runAsNonRoot: true
  #   ports:
  #     - name: port
  #       containerPort: "{{ $.Values.container.port }}"
  initContainers: []
  # additional sidecar containers that will be added to each pod
  # see the sample of init containers above
  sidecarContainers: []
  # additional volumes that will be added to each pod
  # - name: additional-volume
  #   configMap:
  #     name: additional-volume
  additionalVolumes: []
  # additional volume mounts that will be added to each pod
  # - name: additional-volume
  #   mountPath: /opt/app
  #   readOnly: true
  additionalVolumeMounts: []
  # additional service ports that will be added to each pod
  # - name: other-port
  #   port: 8080
  #   targetPort: 8080
  additionalPorts: []
  # additional environment variables that will be added to each pod
  additionalEnv:
    # - name: SOME_ENV
    #   value: "some-value"
    variables: []
    # list of config maps to be added as environment variables
    configMaps: []
    # list of secrets to be added as environment variables
    secrets: []

database:
  # currently only postgresql is supported
  type: "postgresql"
  host: "host.docker.internal"
  port: 5432
  name: "ilmdb"
  username: "ilmuser"
