{{- $valkeyPassword := pluck "password" .Values.global.valkey .Values.valkey | compact | first | default "" }}
apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "caching-valkey.fullname" . }}-test-connection"
  labels:
    {{- include "caching-valkey.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: valkey-test
      image: {{ include "caching-valkey.image" . }}
      command:
        - /bin/sh
        - -c
        - |
          {{- if $valkeyPassword }}
          valkey-cli -h {{ include "caching-valkey.fullname" . }} -a "{{ $valkeyPassword }}" ping | grep -q PONG
          {{- else }}
          valkey-cli -h {{ include "caching-valkey.fullname" . }} ping | grep -q PONG
          {{- end }}
  restartPolicy: Never
