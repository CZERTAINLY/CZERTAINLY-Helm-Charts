apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "rabbitmq-bootstrap.fullname" . }}-test-connection"
  labels:
    {{- include "rabbitmq-bootstrap.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: curl
      image: {{ include "rabbitmq-bootstrap.curl.image" . }}
      command:
        - /bin/sh
        - -c
        - |
          curl --silent --retry 5 --retry-delay 5 --retry-all-errors rabbitmq-bootstrap-service:{{ .Values.service.port }}/actuator/health
  restartPolicy: Never
