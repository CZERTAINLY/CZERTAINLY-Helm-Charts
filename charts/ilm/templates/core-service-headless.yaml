{{- if eq (.Values.workloadType | default "Deployment") "StatefulSet" }}
apiVersion: v1
kind: Service
metadata:
  name: core-service-headless
  labels:
    {{- include "ilm.labels" . | nindent 4 }}
spec:
  clusterIP: None
  ports:
    - port: {{ .Values.service.port }}
      protocol: "TCP"
  selector:
    {{- include "ilm.selectorLabels" . | nindent 4 }}
{{- end }}
