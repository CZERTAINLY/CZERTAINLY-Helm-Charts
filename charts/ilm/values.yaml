# workload type for the core deployment
# Options: "Deployment", "StatefulSet"
workloadType: "Deployment"

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80
replicaCount: 1

service:
  type: "ClusterIP"
  port: 8080

image:
  # default registry name
  registry: hub.omnitrustregistry.com
  repository: ilm
  name: core
  tag: 2.17.0
  # the digest to be used instead of the tag
  digest: ""
  pullPolicy: IfNotPresent
  # array of secret names
  pullSecrets: []
  # custom command and args
  command: []
  args: []
  # default security context
  securityContext:
    runAsNonRoot: true
    # runAsUser: 10001
    readOnlyRootFilesystem: true
  # probes configuration
  probes:
    liveness:
      enabled: false
      # custom probe command, will override the default one
      custom: {}
      initialDelaySeconds: 60
      timeoutSeconds: 5
      periodSeconds: 10
      successThreshold: 1
      failureThreshold: 3
    readiness:
      enabled: true
      # custom probe command, will override the default one
      custom: {}
      initialDelaySeconds: 15
      timeoutSeconds: 5
      periodSeconds: 10
      successThreshold: 1
      failureThreshold: 3
    startup:
      enabled: true
      # custom probe command, will override the default one
      custom: {}
      initialDelaySeconds: 15
      timeoutSeconds: 5
      periodSeconds: 10
      successThreshold: 1
      failureThreshold: 45
  resources: {}
    # We follow recommendations and general guidelines to manage resources from:
    # https://master.sdk.operatorframework.io/docs/best-practices/managing-resources/
    # We recommend default requests for CPU and Memory, leaving the limits as a conscious
    # choice for the user. If you do want to specify your own resources, uncomment the following
    # lines, adjust them as necessary, and remove the curly braces after 'resources'.
    # requests:
    #   cpu: 200m
    #   memory: 2000M
    # limits: {}

volumes:
  ephemeral:
    # available types are: memory, storage, custom
    type: memory
    sizeLimit: "1Mi"
    storageClassName: ""
    custom: {}
    #  emptyDir:
    #    sizeLimit: "10Mi"
    #    medium: "Memory"

curl:
  image:
    # default registry name
    registry: hub.omnitrustregistry.com
    repository: ilm
    name: curl
    tag: 8.16.0
    # the digest to be used instead of the tag
    digest: ""
    pullPolicy: IfNotPresent
    # array of secret names
    pullSecrets: []
    # custom command and args
    command: []
    args: []
    # default security context
    securityContext:
      runAsNonRoot: true
      # runAsUser: 100
      readOnlyRootFilesystem: true
    # it does not make sense to have probes for curl
    resources: {}
      # We follow recommendations and general guidelines to manage resources from:
      # https://master.sdk.operatorframework.io/docs/best-practices/managing-resources/
      # We recommend default requests for CPU and Memory, leaving the limits as a conscious
      # choice for the user. If you do want to specify your own resources, uncomment the following
      # lines, adjust them as necessary, and remove the curly braces after 'resources'.
      # requests:
      #   cpu: 50m
      #   memory: 150M
      # limits: {}

kubectl:
  image:
    # default registry name
    registry: hub.omnitrustregistry.com
    repository: ilm
    name: kubectl
    tag: 2.16.1
    # the digest to be used instead of the tag
    digest: ""
    pullPolicy: IfNotPresent
    # array of secret names
    pullSecrets: []
    # custom command and args
    command: []
    args: []
    # default security context
    securityContext:
      runAsNonRoot: true
      # runAsUser: 1001
      readOnlyRootFilesystem: true
    # it does not make sense to have probes for kubectl

opa:
  image:
    # default registry name
    registry: hub.omnitrustregistry.com
    repository: ilm
    name: opa
    tag: 1.10.0-static
    # the digest to be used instead of the tag
    digest: ""
    pullPolicy: IfNotPresent
    # array of secret names
    pullSecrets: []
    # custom command and args
    command: []
    args: []
    # default security context
    securityContext:
      runAsNonRoot: true
      # runAsUser: 1000
      readOnlyRootFilesystem: true
    # probes configuration
    probes:
      liveness:
        enabled: false
        # custom probe command, will override the default one
        custom: {}
        initialDelaySeconds: 5
        timeoutSeconds: 5
        periodSeconds: 10
        successThreshold: 1
        failureThreshold: 3
      readiness:
        enabled: true
        # custom probe command, will override the default one
        custom: {}
        initialDelaySeconds: 5
        timeoutSeconds: 5
        periodSeconds: 10
        successThreshold: 1
        failureThreshold: 3
      startup:
        enabled: false
        # custom probe command, will override the default one
        custom: {}
        initialDelaySeconds: 5
        timeoutSeconds: 5
        periodSeconds: 10
        successThreshold: 1
        failureThreshold: 3
    resources: {}
      # We follow recommendations and general guidelines to manage resources from:
      # https://master.sdk.operatorframework.io/docs/best-practices/managing-resources/
      # We recommend default requests for CPU and Memory, leaving the limits as a conscious
      # choice for the user. If you do want to specify your own resources, uncomment the following
      # lines, adjust them as necessary, and remove the curly braces after 'resources'.
      # requests:
      #   cpu: 50m
      #   memory: 150M
      # limits: {}

# customization of the chart
initContainers: []
sidecarContainers: []
additionalVolumes: []
additionalVolumeMounts: []
additionalPorts: []
additionalEnv:
  variables: []
  configMaps: []
  secrets: []

logging:
  level: "INFO"

javaOpts: ""

auth:
  header:
    certificate: "ssl-client-cert"

messaging:
  external:
    enabled: false
    host: ""
    amqp:
      port: ""
  remoteAccess: false
  username: "admin"
  password: "admin"
  host: "messaging-service"
  amqp:
    port: 5672
  virtualHost: "czertainly"

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: "ilm-sa"

podLabels: {}

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

certManager:
  version: ""

hostName: "ilm.local"

letsEncrypt:
  # email: notifications@sample.com
  environment: production

ingress:
  enabled: false
  certificate:
    # options: internal, external, letsencrypt
    source: internal
  # options: traefik, nginx
  class: nginx
  annotations: {
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP",
    nginx.ingress.kubernetes.io/auth-tls-verify-client: "optional",
    nginx.ingress.kubernetes.io/auth-tls-secret: "{{ .Release.Namespace }}/trusted-certificates",
    nginx.ingress.kubernetes.io/auth-tls-verify-depth: "3",
    nginx.ingress.kubernetes.io/auth-tls-pass-certificate-to-upstream: "true",
    nginx.ingress.kubernetes.io/proxy-buffer-size: 256k
  }
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
    # nginx.ingress.kubernetes.io/backend-protocol: "HTTP",
    # nginx.ingress.kubernetes.io/auth-tls-verify-client: "optional",
    # nginx.ingress.kubernetes.io/auth-tls-secret: "ilm/ingress-ca-secret",
    # nginx.ingress.kubernetes.io/auth-tls-verify-depth: "3",
    # nginx.ingress.kubernetes.io/auth-tls-pass-certificate-to-upstream: "true"
  # hosts:
  #  - host: ilm.local
  #    paths:
  #      - path: /
  #        pathType: Prefix
  tls:
    secretName: ilm-ingress-tls
  #  - secretName: ilm.local-tls
  #    hosts:
  #      - ilm.local

nodeSelector: {}

tolerations: []

affinity: {}

clustering:
  domain: cluster.local

#
# dependencies management
#
apiGateway:
  nameOverride: api-gateway
  config:
    default: "charts/api-gateway-kong/config/kong.yml"
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 100
    targetCPUUtilizationPercentage: 80
    # targetMemoryUtilizationPercentage: 80
  replicaCount: 1
  service:
    type: "ClusterIP"
    consumer:
      port: 8000
  trustedIps: ""

feAdministrator:
  nameOverride: fe-administrator
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 100
    targetCPUUtilizationPercentage: 80
    # targetMemoryUtilizationPercentage: 80
  replicaCount: 1
  service:
    type: "ClusterIP"
    port: 8080
  podAnnotations: {}

authService:
  nameOverride: auth-service

authOpaPolicies:
  nameOverride: auth-opa-policies

messagingService:
  nameOverride: messaging-service
  enabled: true

schedulerService:
  nameOverride: scheduler-service

provisioningRabbitMq:
  nameOverride: provisioning-rabbitmq
  enabled: false

#
# connectors
#
registerConnectors: true

commonCredentialProvider:
  nameOverride: common-credential-provider
  enabled: true

ejbcaNgConnector:
  nameOverride: ejbca-ng-connector
  enabled: false

pyAdcsConnector:
  nameOverride: pyadcs-connector
  enabled: false

hashicorpVaultConnector:
  nameOverride: hashicorp-vault-connector
  enabled: false

x509ComplianceProvider:
  nameOverride: x509-compliance-provider
  enabled: false

cryptosenseDiscoveryProvider:
  nameOverride: cryptosense-discovery-provider
  enabled: false

ctLogsDiscoveryProvider:
  nameOverride: ct-logs-discovery-provider
  enabled: false

networkDiscoveryProvider:
  nameOverride: network-discovery-provider
  enabled: false

keystoreEntityProvider:
  nameOverride: keystore-entity-provider
  enabled: false

softwareCryptographyProvider:
  nameOverride: software-cryptography-provider
  enabled: false

emailNotificationProvider:
  nameOverride: email-notification-provider
  enabled: false

webhookNotificationProvider:
  nameOverride: webhook-notification-provider
  enabled: false

#
# supportive optional components
#
keycloakInternal:
  nameOverride: keycloak-internal
  # the enabled flag is defined as global.keycloak.enabled

utilsService:
  nameOverride: utils-service
  # the enabled flag is defined as global.utils.enabled
