apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "ilm.fullname" . }}-test-connection"
  labels:
    {{- include "ilm.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: curl
      image: {{ include "ilm.curl.image" . }}
      command:
        - /bin/sh
        - -c
        - |
          curl --silent --retry 10 --retry-delay 5 --retry-all-errors core-service:{{ .Values.service.port }}/api/v1/health/liveness
  restartPolicy: Never
