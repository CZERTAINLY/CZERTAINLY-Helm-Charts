{{- $valkeyEnabled := or .Values.cachingService.enabled .Values.global.valkey.external.enabled }}
{{- if $valkeyEnabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: caching-configmap
data:
  {{- if .Values.global.valkey.external.enabled }}
  valkey.host: {{ .Values.global.valkey.external.host | quote }}
  valkey.port: {{ .Values.global.valkey.external.port | quote }}
  {{- else }}
  valkey.host: "caching-service"
  valkey.port: {{ .Values.cachingService.service.port | default 6379 | quote }}
  {{- end }}
{{- end }}
