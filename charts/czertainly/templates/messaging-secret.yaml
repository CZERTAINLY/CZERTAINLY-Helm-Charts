apiVersion: v1
kind: Secret
metadata:
  name: messaging-secret
stringData:
  {{- $externalMessaging := pluck "enabled" .Values.global.messaging.external .Values.messaging.external | compact | first }}
  {{- if $externalMessaging }}
  {{- $bootstrapEnabled := .Values.rabbitmqBootstrap.enabled }}
  {{- $msgUsername := pluck "username" .Values.global.messaging .Values.messaging | compact | first }}
  {{- $msgPassword := pluck "password" .Values.global.messaging .Values.messaging | compact | first }}
  {{- $coreUsername := pluck "coreUsername" .Values.global.messaging .Values.messaging | compact | first }}
  {{- $corePassword := pluck "corePassword" .Values.global.messaging .Values.messaging | compact | first }}
  {{- $provUsername := pluck "provisionerUsername" .Values.global.messaging .Values.messaging | compact | first }}
  {{- $provPassword := pluck "provisionerPassword" .Values.global.messaging .Values.messaging | compact | first }}
  {{- $proxyUsername := pluck "proxyUsername" .Values.global.messaging .Values.messaging | compact | first }}
  {{- $proxyPassword := pluck "proxyPassword" .Values.global.messaging .Values.messaging | compact | first }}
  {{- if not $msgUsername }}{{- fail "global.messaging.username is required when external messaging is enabled" }}{{- end }}
  {{- if not $msgPassword }}{{- fail "global.messaging.password is required when external messaging is enabled" }}{{- end }}
  {{- if not $coreUsername }}{{- fail "global.messaging.coreUsername is required when external messaging is enabled" }}{{- end }}
  {{- if not $corePassword }}{{- fail "global.messaging.corePassword is required when external messaging is enabled" }}{{- end }}
  {{- if and $bootstrapEnabled (not $provUsername) }}{{- fail "global.messaging.provisionerUsername is required when external messaging and rabbitmqBootstrap.enabled are both true" }}{{- end }}
  {{- if and $bootstrapEnabled (not $provPassword) }}{{- fail "global.messaging.provisionerPassword is required when external messaging and rabbitmqBootstrap.enabled are both true" }}{{- end }}
  {{- if and $bootstrapEnabled (not $proxyUsername) }}{{- fail "global.messaging.proxyUsername is required when external messaging and rabbitmqBootstrap.enabled are both true" }}{{- end }}
  {{- if and $bootstrapEnabled (not $proxyPassword) }}{{- fail "global.messaging.proxyPassword is required when external messaging and rabbitmqBootstrap.enabled are both true" }}{{- end }}
  messaging.username: {{ $msgUsername | quote }}
  messaging.password: {{ $msgPassword | quote }}
  messaging.core.username: {{ $coreUsername | quote }}
  messaging.core.password: {{ $corePassword | quote }}
  {{- if $bootstrapEnabled }}
  messaging.provisioner.username: {{ $provUsername | quote }}
  messaging.provisioner.password: {{ $provPassword | quote }}
  messaging.proxy.username: {{ $proxyUsername | quote }}
  messaging.proxy.password: {{ $proxyPassword | quote }}
  {{- end }}
  {{- else }}
  messaging.username: {{ pluck "username" .Values.global.messaging .Values.messagingService.messaging | compact | first | quote }}
  messaging.password: {{ pluck "password" .Values.global.messaging .Values.messagingService.messaging | compact | first | quote }}
  messaging.core.username: {{ pluck "coreUsername" .Values.global.messaging .Values.messagingService.messaging | compact | first | quote }}
  messaging.core.password: {{ pluck "corePassword" .Values.global.messaging .Values.messagingService.messaging | compact | first | quote }}
  messaging.provisioner.username: {{ pluck "provisionerUsername" .Values.global.messaging .Values.messagingService.messaging | compact | first | quote }}
  messaging.provisioner.password: {{ pluck "provisionerPassword" .Values.global.messaging .Values.messagingService.messaging | compact | first | quote }}
  messaging.proxy.username: {{ pluck "proxyUsername" .Values.global.messaging .Values.messagingService.messaging | compact | first | quote }}
  messaging.proxy.password: {{ pluck "proxyPassword" .Values.global.messaging .Values.messagingService.messaging | compact | first | quote }}
  messaging.cookie: {{ .Values.messagingService.messaging.erlang.cookie | quote }}
  messaging.definitions.json: |-
    {{- include "messaging-rabbitmq.definitions.json" (dict "global" .Values.global "messagingService" .Values.messagingService) | indent 4 }}
  {{- end }}
