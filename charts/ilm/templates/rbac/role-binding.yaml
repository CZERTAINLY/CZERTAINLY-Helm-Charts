apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ilm-role-binding
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "ilm.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "ilm.serviceAccountName" . }}
roleRef:
  kind: Role
  name: ilm-role
  apiGroup: rbac.authorization.k8s.io